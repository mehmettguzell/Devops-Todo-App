openapi: 3.0.3
info:
  title: Bitir Tasks API
  version: "0.1.0"
  description: >
    REST contract for the Bitir active-task-list skeleton (feature 001).
    Single-user, no authentication.
paths:
  /tasks:
    get:
      summary: List tasks by status
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, completed]
            default: active
          description: >
            Filters the list. `active` tasks are ordered newest-first
            (created_at DESC). `completed` tasks are ordered
            most-recently-completed-first (completed_at DESC).
      responses:
        "200":
          description: List of tasks matching the filter.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Task created; appears in the active list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "422":
          description: >
            Validation failed (missing/empty title, missing or non-positive
            estimated_duration_minutes, or invalid/missing energy_level).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
  /tasks/{task_id}/complete:
    patch:
      summary: Mark a task as completed
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: >
            Task marked completed and returned. Idempotent: calling this on
            an already-completed task returns 200 with the task unchanged
            (no error, no duplicate).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: No task exists with the given task_id.
components:
  schemas:
    EnergyLevel:
      type: string
      enum: [low, medium, high]
    TaskStatus:
      type: string
      enum: [active, completed]
    TaskCreate:
      type: object
      required: [title, estimated_duration_minutes, energy_level]
      properties:
        title:
          type: string
          minLength: 1
        estimated_duration_minutes:
          type: integer
          minimum: 1
        energy_level:
          $ref: "#/components/schemas/EnergyLevel"
    Task:
      type: object
      required:
        - id
        - title
        - estimated_duration_minutes
        - energy_level
        - status
        - created_at
      properties:
        id:
          type: integer
        title:
          type: string
        estimated_duration_minutes:
          type: integer
        energy_level:
          $ref: "#/components/schemas/EnergyLevel"
        status:
          $ref: "#/components/schemas/TaskStatus"
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
    ValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  type: string
              msg:
                type: string
