openapi: 3.0.3
info:
  title: Bitir Tasks API
  version: "0.2.0"
  description: >
    REST contract for Bitir's task list, updated for feature 003 (task fading & archival).
    Supersedes specs/001-bitir-task-skeleton/contracts/tasks-api.yaml: widens `status`,
    adds `last_touched_at`/`fading_exempt`/`due_date` to Task, adds the `archived` status
    filter, and adds the `/revive` and `/fading` endpoints. Single-user, no authentication.
paths:
  /tasks:
    get:
      summary: List tasks by status
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, completed, archived]
            default: active
          description: >
            Filters the list. `active` returns tasks whose status is `active` or `faded`
            (faded tasks remain part of the active list — see Task.status), ordered with
            non-faded tasks first and each group newest-first (created_at DESC). `completed`
            returns tasks ordered most-recently-completed-first (completed_at DESC).
            `archived` returns archived tasks ordered by last_touched_at DESC.
            Before this endpoint responds, the server evaluates and applies any pending
            fade/archive transitions (see data-model.md's "Effective fade/archive clock").
      responses:
        "200":
          description: List of tasks matching the filter.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Task created; appears in the active list, fresh (not faded).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "422":
          description: Validation failed (see ValidationError).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
  /tasks/{task_id}/complete:
    patch:
      summary: Mark a task as completed
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: >
            Task marked completed and returned. Works identically whether the task was
            `active` or `faded`. Idempotent on an already-completed task (200, unchanged).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: No task exists with the given task_id.
        "409":
          description: The task is `archived` — it must be revived before it can be completed.
  /tasks/{task_id}/revive:
    patch:
      summary: Revive a faded or archived task back to active
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: >
            Task's status is set to `active` and `last_touched_at` reset to now. No-op
            (still 200) if the task was already `active`. Does not affect `completed` tasks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: No task exists with the given task_id.
        "409":
          description: The task is `completed` — revive does not apply to completed tasks.
  /tasks/{task_id}/fading:
    patch:
      summary: Update a task's fading exemption and/or due date
      description: >
        Updates only the fields provided. Setting `fading_exempt` to true, or setting a
        future `due_date`, on a task that is currently `faded` or `archived` immediately
        returns it to `active` with `last_touched_at` reset to now (see data-model.md State
        Transitions). Setting `fading_exempt` from true back to false resets
        `last_touched_at` to now regardless of current status (FR-013).
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskFadingUpdate"
      responses:
        "200":
          description: Updated task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: No task exists with the given task_id.
        "422":
          description: Invalid due_date format, or an empty request body.
components:
  schemas:
    EnergyLevel:
      type: string
      enum: [low, medium, high]
    TaskStatus:
      type: string
      enum: [active, faded, archived, completed]
    TaskCreate:
      type: object
      required: [title, estimated_duration_minutes, energy_level]
      properties:
        title:
          type: string
          minLength: 1
        estimated_duration_minutes:
          type: integer
          minimum: 1
        energy_level:
          $ref: "#/components/schemas/EnergyLevel"
        due_date:
          type: string
          format: date
          nullable: true
    TaskFadingUpdate:
      type: object
      description: At least one of the two fields must be present.
      properties:
        fading_exempt:
          type: boolean
        due_date:
          type: string
          format: date
          nullable: true
    Task:
      type: object
      required:
        - id
        - title
        - estimated_duration_minutes
        - energy_level
        - status
        - created_at
        - last_touched_at
        - fading_exempt
      properties:
        id:
          type: integer
        title:
          type: string
        estimated_duration_minutes:
          type: integer
        energy_level:
          $ref: "#/components/schemas/EnergyLevel"
        status:
          $ref: "#/components/schemas/TaskStatus"
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        last_touched_at:
          type: string
          format: date-time
        fading_exempt:
          type: boolean
        due_date:
          type: string
          format: date
          nullable: true
    ValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  type: string
              msg:
                type: string
