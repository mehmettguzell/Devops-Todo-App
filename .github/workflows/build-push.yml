name: build and registry push

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-22.04
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: resolve previous release tag
        id: prev
        run: |
          current_tag="${GITHUB_REF_NAME}"
          prev_tag=$(git tag --sort=-v:refname | grep -v "^${current_tag}$" | head -n1)
          if [ -z "$prev_tag" ]; then
            prev_tag=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "base=$prev_tag" >> "$GITHUB_OUTPUT"

      - name: filter paths changed since previous release
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          base: ${{ steps.prev.outputs.base }}
          ref: ${{ github.ref }}
          filters: |
            backend:
              - 'todo-api/backend/**'
            frontend:
              - 'todo-api/frontend/**'

  build:
    needs: changes
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: backend
            context: todo-api/backend
            build-args: ""
            changed: ${{ needs.changes.outputs.backend }}
          - image: frontend
            context: todo-api/frontend
            build-args: |
              VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            changed: ${{ needs.changes.outputs.frontend }}

    steps:
      - name: skip unchanged image
        if: matrix.changed != 'true'
        run: echo "No changes for ${{ matrix.image }} since previous release, skipping build."

      - uses: actions/checkout@v7
        if: matrix.changed == 'true'

      - name: set up docker buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: log in to ghcr
        if: matrix.changed == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: lowercase repository name
        if: matrix.changed == 'true'
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: extract metadata
        if: matrix.changed == 'true'
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.name }}/${{ matrix.image }}
          tags: |
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: build and push
        if: matrix.changed == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: ${{ matrix.build-args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
