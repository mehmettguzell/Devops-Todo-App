name: close stale issues and prs

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  close-stale-issues-and-prs:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v10.1.1
        with:
          days-before-stale: 30
          days-before-close: 7
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,security
          stale-issue-message: >
            This issue has had no activity for 30 days and will be closed in 7 days
            if no further activity occurs.
          stale-pr-message: >
            This pull request has had no activity for 30 days and will be closed in 7 days
            if no further activity occurs.
          stale-issue-label: stale
          stale-pr-label: stale
